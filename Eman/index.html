<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ألبوم الصور التفاعلي</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; user-select: none; }
        
        video#arjs-video {
            width: 100vw !important;
            height: 100vh !important;
            object-fit: cover !important;
            left: 0px !important;
            top: 0px !important;
            margin: 0px !important;
        }

        .a-canvas {
            width: 100vw !important;
            height: 100vh !important;
            left: 0px !important;
            top: 0px !important;
        }

        #instruction-overlay {
            position: absolute;
            top: 45px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px rgba(255, 255, 255, 0.15) solid;
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            text-align: center;
            white-space: nowrap;
            pointer-events: none;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .control-btn {
            position: absolute;
            z-index: 9999;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px rgba(255, 255, 255, 0.15) solid;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            text-decoration: none;
            white-space: nowrap !important;
        }
        .control-btn:active { transform: scale(0.9); }

        #mute-btn {
            top: 30px !important;
            right: 20px !important;
            left: auto !important;
            bottom: auto !important;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 18px;
        }

        #facebook-btn {
            bottom: 30px !important;
            right: 20px !important;
            left: auto !important;
            top: auto !important;
            background: #1877f2;
            border-radius: 30px;
            padding: 12px 20px;
            font-size: 13px;
            font-weight: bold;
            gap: 8px;
            border: 1px rgba(255, 255, 255, 0.25) solid;
            box-shadow: 0 8px 20px rgba(24, 119, 242, 0.3);
        }

        #whatsapp-btn {
            bottom: 30px !important;
            left: 20px !important;
            right: auto !important;
            top: auto !important;
            background: #25d366;
            border-radius: 30px;
            padding: 12px 20px;
            font-size: 13px;
            font-weight: bold;
            gap: 8px;
            border: 1px rgba(255, 255, 255, 0.25) solid;
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3);
        }
    </style>

    <script>
        // ✅ إصلاح 1: عداد الـ targets النشطة بدل متغير واحد فقط
        let activeTargets = 0;
        let musicUnlocked = false;

        AFRAME.registerComponent('video-controller', {
            schema: {
                video: { type: 'selector' }
            },
            init: function () {
                const video = this.data.video;
                const target = this.el;
                const instruction = document.querySelector('#instruction-overlay');
                const music = document.querySelector('#bg-music');
                const muteBtn = document.querySelector('#mute-btn');

                target.addEventListener('targetFound', () => {
                    activeTargets++;

                    // ✅ إصلاح 2: تأكد الفيديو muted قبل التشغيل (مهم لـ iOS)
                    video.muted = true;
                    video.play().catch(err => console.log('فيديو:', err));

                    // شغّل الموسيقى بس لو مش بتعزف وعداد البدء واحد
                    if (activeTargets === 1) {
                        const playPromise = music.play();
                        if (playPromise !== undefined) {
                            playPromise.then(() => {
                                musicUnlocked = true;
                                if (instruction && !music.muted) {
                                    instruction.style.opacity = '0';
                                    instruction.style.visibility = 'hidden';
                                }
                            }).catch(err => {
                                console.log("الصوت محظور تلقائياً، انتظر لمسة من المستخدم");
                                if (instruction && !music.muted) {
                                    instruction.innerHTML = "🔊 اضغط على الشاشة لتفعيل الصوت";
                                    instruction.style.opacity = '1';
                                    instruction.style.visibility = 'visible';
                                }
                            });
                        }
                    }

                    // ✅ إصلاح 3: تحديث أيقونة الميوت بناءً على الحالة الفعلية
                    muteBtn.innerHTML = music.muted ? "🔇" : "🔊";
                });

                target.addEventListener('targetLost', () => {
                    activeTargets = Math.max(0, activeTargets - 1);
                    video.pause();

                    // ✅ إصلاح 1 (تطبيق): الموسيقى توقف بس لما يختفي آخر target
                    if (activeTargets === 0) {
                        music.pause();
                        if (instruction) {
                            instruction.innerHTML = "وجّه الكاميرا نحو الصورة المطبوعة 📸";
                            instruction.style.opacity = '1';
                            instruction.style.visibility = 'visible';
                        }
                    }
                });
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            const music = document.querySelector('#bg-music');
            const instruction = document.querySelector('#instruction-overlay');
            const muteBtn = document.querySelector('#mute-btn');

            // ✅ إصلاح 3: حالة الزر متزامنة مع الصوت الفعلي من البداية
            muteBtn.innerHTML = music.muted ? "🔇" : "🔊";

            muteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (music.muted) {
                    music.muted = false;
                    muteBtn.innerHTML = "🔊";
                    if (activeTargets > 0) music.play().catch(e => console.log(e));
                } else {
                    music.muted = true;
                    muteBtn.innerHTML = "🔇";
                }
            });

            // فك حظر الصوت عند أول لمسة
            document.body.addEventListener('click', () => {
                if (activeTargets > 0 && music.paused && !music.muted) {
                    music.play().then(() => {
                        musicUnlocked = true;
                        if (instruction) {
                            instruction.style.opacity = '0';
                            instruction.style.visibility = 'hidden';
                        }
                    }).catch(e => console.log(e));
                }
            }, { once: false });
        });
    </script>
</head>
<body>

    <button id="mute-btn" class="control-btn">🔊</button>
    
    <a id="facebook-btn" class="control-btn" href="https://www.facebook.com/profile.php?id=61582938020960" target="_blank">
        🔵 صفحتنا على فيسبوك
    </a>

    <a id="whatsapp-btn" class="control-btn" href="https://wa.me/201096320826?text=السلام%20عليكم%20ورحمة%20الله%20وبركاته%2C%20أود%20الطلب%20والاستفسار%20عن%20ألبوم%20الصور%20التفاعلي" target="_blank">
        💬 اطلب ألبومك الخاص
    </a>

    <div id="instruction-overlay">وجّه الكاميرا نحو الصورة المطبوعة 📸</div>

    <a-scene mindar-image="imageTargetSrc: ./markers/targets.mind; autoStart: true; filterMinCF: 0.001; filterBeta: 0.01;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="video-1" src="./videos/video1.mp4" preload="auto" loop="true" muted playsinline webkit-playsinline crossorigin="anonymous"></video>
            <video id="video-2" src="./videos/video2.mp4" preload="auto" loop="true" muted playsinline webkit-playsinline crossorigin="anonymous"></video>
            <video id="video-3" src="./videos/video3.mp4" preload="auto" loop="true" muted playsinline webkit-playsinline crossorigin="anonymous"></video>
            <audio id="bg-music" src="./music.mp3" preload="auto" loop="true" crossorigin="anonymous"></audio>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- الصورة الأولى (ترتيب 0) -->
        <a-entity mindar-image-target="targetIndex: 0" video-controller="video: #video-1">
            <a-video src="#video-1" width="1" height="1.35" position="0 0 0" rotation="0 0 0"></a-video>
        </a-entity>
        
        <!-- الصورة الثانية (ترتيب 1) -->
        <a-entity mindar-image-target="targetIndex: 1" video-controller="video: #video-2">
            <a-video src="#video-2" width="1" height="1.35" position="0 0 0" rotation="0 0 0"></a-video>
        </a-entity>

        <!-- الصورة الثالثة (ترتيب 2) -->
        <a-entity mindar-image-target="targetIndex: 2" video-controller="video: #video-3">
            <a-video src="#video-3" width="1" height="1.35" position="0 0 0" rotation="0 0 0"></a-video>
        </a-entity>
        
    </a-scene>

</body>
</html>
