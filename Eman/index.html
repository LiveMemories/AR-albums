<script>
        let isTargetActive = false;
        let toastTimer = null;

        function showToast(msg) {
            const toast = document.querySelector('#found-toast');
            if (!toast) return;
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
        }

        AFRAME.registerComponent('video-controller', {
            schema: { video: { type: 'selector' } },
            init: function () {
                const video   = this.data.video;
                const target  = this.el;
                const instr   = document.querySelector('#instruction-overlay');
                const music   = document.querySelector('#bg-music');
                const frame   = document.querySelector('#scan-frame');
                const status  = document.querySelector('#status-badge');

                target.addEventListener('targetFound', () => {
                    isTargetActive = true;
                    video.play().catch(e => console.log(e));

                    frame && frame.classList.add('found');
                    status && status.classList.add('active');
                    if (status) status.querySelector('.status-label').textContent = 'جارٍ العرض';
                    instr && instr.classList.add('hidden');
                    showToast('✦ تم اكتشاف الصورة');

                    music.play().catch(() => {
                        if (!music.muted && instr) {
                            instr.innerHTML = '<span class="inst-dot"></span> اضغط على الشاشة لتفعيل الصوت';
                            instr.classList.remove('hidden');
                        }
                    });
                });

                target.addEventListener('targetLost', () => {
                    isTargetActive = false;
                    video.pause();
                    music.pause();

                    frame && frame.classList.remove('found');
                    status && status.classList.remove('active');
                    if (status) status.querySelector('.status-label').textContent = 'جاهز';

                    if (instr) {
                        instr.innerHTML = '<span class="inst-dot"></span> وجّه الكاميرا نحو الصورة المطبوعة 📸';
                        instr.classList.remove('hidden');
                    }
                });
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            const music  = document.querySelector('#bg-music');
            const instr  = document.querySelector('#instruction-overlay');
            const muteBtn = document.querySelector('#mute-btn');
            const loader = document.querySelector('#loading-screen');
            const loaderSubtitle = document.querySelector('.loader-subtitle');
            const scene = document.querySelector('a-scene');

            /* ---- شاشة التحميل: تختفي بعد تهيئة الكاميرا أو عند حدوث خطأ ---- */
            const hideLoader = () => {
                if (loader) loader.classList.add('hidden');
            };

            if (scene) {
                // 1. عندما تكون الكاميرا جاهزة وتم تشغيل الـ AR بنجاح
                scene.addEventListener('arReady', () => {
                    setTimeout(hideLoader, 500);
                });

                // 2. في حال فشل الكاميرا (بسبب رفض الإذن أو عدم تشغيل الكود عبر HTTPS)
                scene.addEventListener('arError', (event) => {
                    hideLoader(); // إخفاء شاشة التحميل فوراً لرؤية رسالة الخطأ
                    alert("⚠️ لم نتمكن من تشغيل الكاميرا!\n\nيرجى التأكد من:\n1. فتح الرابط عبر بروتوكول آمن (HTTPS) أو سيرفر محلي (Localhost).\n2. السماح للموقع بالوصول للكاميرا من إعدادات المتصفح.");
                    if (loaderSubtitle) {
                        loaderSubtitle.innerHTML = "<span style='color: #ff4d4d; font-weight: bold;'>⚠️ فشل تشغيل الكاميرا. يرجى تفعيل إذن الكاميرا واستخدام رابط آمن HTTPS.</span>";
                    }
                });

                // 3. كاحتياطي أمان في حال لم يستجب حدث arReady لسبب ما
                scene.addEventListener('loaded', () => {
                    // ننتظر قليلاً لإعطاء الأولوية لـ arReady
                    setTimeout(hideLoader, 3000); 
                });
            }

            /* احتياطي أخير لضمان عدم بقاء الشاشة معلقة للأبد تحت أي ظرف */
            setTimeout(hideLoader, 8000);

            /* ---- زر كتم الصوت ---- */
            muteBtn.addEventListener('click', e => {
                e.stopPropagation();
                music.muted = !music.muted;
                muteBtn.textContent = music.muted ? '🔇' : '🔊';
                if (!music.muted && isTargetActive) music.play().catch(() => {});
            });

            /* ---- لمس الشاشة لفك حظر الصوت ---- */
            document.body.addEventListener('click', () => {
                if (isTargetActive && music.paused && !music.muted) {
                    music.play().then(() => {
                        instr && instr.classList.add('hidden');
                    }).catch(() => {});
                }
            });
        });
    </script>
