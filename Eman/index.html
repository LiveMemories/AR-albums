    <script>
        let isTargetActive = false;
        let muteBtnState = false; 
        let customAudioLinks = {}; 

        let activeVideo = null;
        let activeAudio = null;

        // قراءة ملف الروابط التفاعلية المرفوع بواسطة الـ PHP فور فتح الصفحة
        fetch('./audio_links.json')
            .then(res => res.json())
            .then(data => { customAudioLinks = data; })
            .catch(err => console.log("لا توجد روابط تفاعلية مضافة للعميل."));

        // برمجة المكون المطور للتحكم الذكي بالصوت لكل صفحة تفاعلية بشكل مستقل
        AFRAME.registerComponent('video-controller', {
            schema: {
                video: {type: 'selector'},
                pageNum: {type: 'string'}
            },
            init: function () {
                const video = this.data.video;
                const pageNum = this.data.pageNum;
                const target = this.el;
                const instruction = document.querySelector('#instruction-overlay');

                const audio = document.createElement('audio');
                audio.setAttribute('preload', 'auto');
                audio.setAttribute('loop', 'true');
                audio.setAttribute('crossorigin', 'anonymous');
                this.audio = audio;
                document.body.appendChild(audio);

                target.addEventListener('targetFound', () => {
                    isTargetActive = true;
                    activeVideo = video;
                    activeAudio = audio;

                    const localAudioSrc = `./audios/${pageNum}.mp3`;
                    const customLink = customAudioLinks[pageNum] || "";

                    fetch(localAudioSrc, { method: 'HEAD' })
                        .then(res => {
                            if (res.ok) {
                                playWithCustomAudio(localAudioSrc);
                            } else if (customLink !== "") {
                                playWithCustomAudio(customLink);
                            } else {
                                playWithNativeSound();
                            }
                        })
                        .catch(() => {
                            if (customLink !== "") {
                                playWithCustomAudio(customLink);
                            } else {
                                playWithNativeSound();
                            }
                        });

                    function playWithCustomAudio(src) {
                        video.muted = true; 
                        video.play().catch(err => console.log(err));

                        audio.src = src;
                        audio.muted = muteBtnState; 
                        audio.play()
                            .then(() => hideInstruction())
                            .catch(err => showAudioTapRequired());
                    }

                    function playWithNativeSound() {
                        video.muted = muteBtnState; 
                        video.play()
                            .then(() => hideInstruction())
                            .catch(err => showAudioTapRequired());
                    }

                    function hideInstruction() {
                        if (instruction) {
                            instruction.style.opacity = '0';
                            instruction.style.visibility = 'hidden';
                        }
                    }

                    function showAudioTapRequired() {
                        if (instruction && !muteBtnState) {
                            instruction.innerHTML = "🔊 اضغط على الشاشة لتفعيل الصوت الموسيقي";
                            instruction.style.opacity = '1';
                            instruction.style.visibility = 'visible';
                        }
                    }
                });

                target.addEventListener('targetLost', () => {
                    isTargetActive = false;
                    video.pause();
                    audio.pause();
                    
                    activeVideo = null;
                    activeAudio = null;

                    if (instruction) {
                        instruction.innerHTML = "وجّه الكاميرا نحو الصورة المطبوعة 📸";
                        instruction.style.opacity = '1';
                        instruction.style.visibility = 'visible';
                    }
                });
            }
        });

        // إدارة زر كتم الصوت واللمس لفك حظر متصفحات الهواتف الذكية
        window.addEventListener('DOMContentLoaded', () => {
            const instruction = document.querySelector('#instruction-overlay');
            const muteBtn = document.querySelector('#mute-btn');
            const splashScreen = document.querySelector('#splash-screen');
            const readyBtn = document.querySelector('#ready-btn');

            // منطق نقر زر "جاهز للبدء"
            readyBtn.addEventListener('click', () => {
                // تفعيل صوت مؤقت غير مسموع لفك حظر المتصفحات فوراً
                const context = new (window.AudioContext || window.webkitAudioContext)();
                context.resume();

                // إخفاء صفحة البداية الفاخرة تدريجياً
                splashScreen.style.opacity = '0';
                splashScreen.style.visibility = 'hidden';
                setTimeout(() => {
                    splashScreen.remove(); // إزالة العنصر تماماً لتوفير موارد الذاكرة
                }, 600);
            });

            muteBtn.addEventListener('click', (e) => {
                e.stopPropagation(); 
                
                if (muteBtnState) {
                    muteBtnState = false;
                    muteBtn.innerHTML = "🔊";
                    
                    if (isTargetActive) {
                        if (activeAudio && activeAudio.src && !activeAudio.src.endsWith('undefined')) {
                            activeAudio.muted = false;
                            activeAudio.play().catch(e => console.log(e));
                        } else if (activeVideo) {
                            activeVideo.muted = false;
                            activeVideo.play().catch(e => console.log(e));
                        }
                    }
                } else {
                    muteBtnState = true;
                    muteBtn.innerHTML = "🔇";
                    
                    if (activeAudio) activeAudio.muted = true;
                    if (activeVideo) activeVideo.muted = true;
                }
            });

            document.body.addEventListener('click', () => {
                if (isTargetActive && !muteBtnState) {
                    if (activeAudio && activeAudio.paused && activeAudio.src && !activeAudio.src.endsWith('undefined')) {
                        activeAudio.play().then(() => {
                            if (instruction) {
                                instruction.style.opacity = '0';
                                instruction.style.visibility = 'hidden';
                            }
                        }).catch(e => console.log(e));
                    } else if (activeVideo && activeVideo.paused) {
                        activeVideo.play().then(() => {
                            if (instruction) {
                                instruction.style.opacity = '0';
                                instruction.style.visibility = 'hidden';
                            }
                        }).catch(e => console.log(e));
                    }
                }
            });
        });
    </script>
