<?php
// تعديل إعدادات السيرفر للسماح برفع ملفات ذات أحجام كبيرة
ini_set('upload_max_filesize', '500M');
ini_set('post_max_size', '505M');
ini_set('max_input_time', 3600);
ini_set('max_execution_time', 3600);

// تفعيل ميزات ترميز UTF-8 للغة العربية لضمان توافق أسماء المجلدات
header('Content-Type: text/html; charset=utf-8');

if ($_SERVER['REQUEST_METHOD'] === 'POST') {
    
    // استقبال الاسم العربي وتنظيفه من الرموز الخاصة مع السماح بالحروف العربية، الإنجليزية، الأرقام، والمسافات
    $rawClientName = $_POST['clientName'];
    
    // فلتر ذكي يسمح بالأبجدية العربية والمسافات والشرطات فقط ويمنع أي أكواد ضارة
    $clientName = preg_replace('/[^\p{Arabic}\p{L}0-9\s_-]/u', '', $rawClientName);
    $clientName = trim($clientName);
    
    // تنظيف رقم الهاتف ومسح أي رموز غريبة
    $clientPhone = preg_replace('/[^0-9+]/', '', $_POST['clientPhone']);
    
    if (empty($clientName)) {
        http_response_code(400);
        echo "اسم العميل غير صالح.";
        exit;
    }

    // بناء المسار الشجري المعتمد للعميل تلقائياً على خادمك بالاسم العربي
    $clientBaseDir = __DIR__ . '/' . $clientName;
    $albumDir = $clientBaseDir . '/Album';
    $photosDir = $albumDir . '/photos';
    $videosDir = $albumDir . '/videos';

    // إنشاء المجلدات مع التأكد من إعطاء الصلاحيات الصحيحة لدعم أسماء المجلدات العربية
    if (!file_exists($photosDir)) {
        mkdir($photosDir, 0755, true);
    }
    if (!file_exists($videosDir)) {
        mkdir($videosDir, 0755, true);
    }

    // حفظ ملف نصي صغير يحتوي على بيانات الاتصال بالعميل كمرجع لك بداخل مجلد العميل
    file_put_contents($clientBaseDir . '/info.txt', "Client Name: $clientName\nWhatsApp/Phone: $clientPhone\nUpload Date: " . date('Y-m-d H:i:s'));

    // الدوران حول المدخلات لتسمية وحفظ الملفات بالتسلسل المعتمد (01, 02 ... 20)
    for ($i = 1; $i <= 20; $i++) {
        $pageNum = str_pad($i, 2, '0', STR_PAD_LEFT);

        // 1. معالجة وحفظ الصور المطبوعة
        $imgKey = 'img_' . $pageNum;
        if (isset($_FILES[$imgKey]) && $_FILES[$imgKey]['error'] === UPLOAD_ERR_OK) {
            $tmpName = $_FILES[$imgKey]['tmp_name'];
            $ext = pathinfo($_FILES[$imgKey]['name'], PATHINFO_EXTENSION);
            if (empty($ext)) $ext = 'jpg';
            
            $targetPath = $photosDir . '/' . $pageNum . '.' . strtolower($ext);
            move_uploaded_file($tmpName, $targetPath);
        }

        // 2. معالجة وحفظ فيديوهات الواقع المعزز المقابلة
        $vidKey = 'vid_' . $pageNum;
        if (isset($_FILES[$vidKey]) && $_FILES[$vidKey]['error'] === UPLOAD_ERR_OK) {
            $tmpName = $_FILES[$vidKey]['tmp_name'];
            $ext = pathinfo($_FILES[$vidKey]['name'], PATHINFO_EXTENSION);
            if (empty($ext)) $ext = 'mp4';
            
            $targetPath = $videosDir . '/' . $pageNum . '.' . strtolower($ext);
            move_uploaded_file($tmpName, $targetPath);
        }
    }

    http_response_code(200);
    echo "Success";
    exit;
} else {
    http_response_code(405);
    echo "Method Not Allowed";
}
?>
