<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LiveMemories · AR Photo Album</title>

    <!-- خط عربي أنيق -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

    <!-- مكتبات MindAR و A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        /* ====== متغيرات التصميم الأساسية ====== */
        :root {
            --gold: #c9a84c;
            --gold-light: #f0d080;
            --gold-glow: rgba(201, 168, 76, 0.35);
            --dark-glass: rgba(8, 12, 24, 0.80);
            --dark-glass-light: rgba(8, 12, 24, 0.55);
            --border-glass: rgba(201, 168, 76, 0.20);
            --white-dim: rgba(255, 255, 255, 0.88);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Tajawal', system-ui, sans-serif;
            user-select: none;
            background: #000;
        }

        /* ====== ضبط الكاميرا لتغطية الشاشة بالكامل ====== */
        video#arjs-video {
            width: 100vw !important;
            height: 100vh !important;
            object-fit: cover !important;
            left: 0 !important;
            top: 0 !important;
            margin: 0 !important;
        }

        .a-canvas {
            width: 100vw !important;
            height: 100vh !important;
            left: 0 !important;
            top: 0 !important;
        }

        /* ====== شاشة التحميل الافتتاحية ====== */
        #loading-screen {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: #070b16;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* ---- اللوجو الرئيسي في شاشة التحميل ---- */
        .lm-logo-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            animation: logo-appear 1s ease both;
        }

        @keyframes logo-appear {
            from { opacity: 0; transform: translateY(18px) scale(0.92); }
            to   { opacity: 1; transform: translateY(0)    scale(1); }
        }

        .lm-monogram {
            width: 140px;
            height: 140px;
            position: relative;
        }

        /* الحلقات الدوارة حول المونوغرام */
        /* --- حلقات الدوران --- */
        .lm-ring-outer  { animation: lm-cw  30s linear infinite;  transform-origin: 70px 70px; }
        .lm-ring-mid    { animation: lm-ccw 18s linear infinite;  transform-origin: 70px 70px; }
        .lm-ring-inner  { animation: lm-cw  10s linear infinite;  transform-origin: 70px 70px; }

        /* --- تحريكات الكاميرا (العدسة مركزها 88,92) --- */
        .cam-ring-outer   { animation: lm-cw  28s linear infinite;  transform-origin: 88px 92px; }
        .cam-ring-mid     { animation: lm-ccw 14s linear infinite;  transform-origin: 88px 92px; }
        .cam-aperture     { animation: lm-cw   9s linear infinite;  transform-origin: 88px 92px; }
        .cam-shutter-pulse{ animation: lm-pulse 1.8s ease-in-out infinite; }
        .cam-body-glow    { animation: lm-pulse 3.5s ease-in-out infinite; }

        /* --- قوس الذنب المتوهج (ثلاث طبقات) --- */
        .lm-arc-main  { animation: lm-cw 2.2s cubic-bezier(0.4,0,0.6,1) infinite;
                        transform-origin: 70px 70px; }
        .lm-arc-mid   { animation: lm-cw 2.2s cubic-bezier(0.4,0,0.6,1) infinite;
                        transform-origin: 70px 70px; animation-delay: 0.12s; }
        .lm-arc-tail  { animation: lm-cw 2.2s cubic-bezier(0.4,0,0.6,1) infinite;
                        transform-origin: 70px 70px; animation-delay: 0.24s; }

        /* --- نبضة الهالة الخلفية --- */
        .lm-pulse-halo { animation: lm-pulse 2.8s ease-in-out infinite;
                         transform-origin: 70px 70px; }

        /* --- وميض المركز --- */
        .lm-center-breathe { animation: lm-breathe 2.4s ease-in-out infinite; }

        @keyframes lm-cw    { to   { transform: rotate( 360deg); } }
        @keyframes lm-ccw   { to   { transform: rotate(-360deg); } }
        @keyframes lm-pulse {
            0%, 100% { opacity: 0.04; transform: scale(0.95); }
            50%      { opacity: 0.16; transform: scale(1.06); }
        }
        @keyframes lm-breathe {
            0%, 100% { opacity: 1;   }
            50%      { opacity: 0.55; }
        }

        .loader-brand-name {
            font-family: 'Cinzel', serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--gold-light);
            text-align: center;
            margin-top: 12px;
            text-shadow: 0 0 28px rgba(201,168,76,0.45);
        }

        .loader-brand-name span {
            color: var(--gold);
        }

        .loader-tagline {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 13px;
            letter-spacing: 2.5px;
            color: rgba(255,255,255,0.40);
            text-align: center;
            margin-top: 5px;
            text-transform: uppercase;
        }

        .loader-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 2px;
        }
        .loader-divider::before,
        .loader-divider::after {
            content: '';
            width: 40px;
            height: 0.5px;
            background: linear-gradient(90deg, transparent, var(--gold));
        }
        .loader-divider::after {
            background: linear-gradient(90deg, var(--gold), transparent);
        }
        .loader-divider-gem {
            width: 5px;
            height: 5px;
            background: var(--gold);
            transform: rotate(45deg);
        }

        .loader-subtitle {
            color: rgba(255,255,255,0.38);
            font-size: 12px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        /* ---- شارة العلامة التجارية الثابتة فوق الكاميرا ---- */
        #brand-bar {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9997;
            display: flex;
            align-items: center;
            gap: 9px;
            pointer-events: none;
        }

        .brand-bar-inner {
            background: var(--dark-glass);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--border-glass);
            border-radius: 40px;
            padding: 7px 18px 7px 10px;
            display: flex;
            align-items: center;
            gap: 9px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .brand-bar-monogram {
            width: 28px;
            height: 28px;
            flex-shrink: 0;
        }

        .brand-bar-text {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        .brand-bar-name {
            font-family: 'Cinzel', serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--gold-light);
        }

        .brand-bar-sub {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 9.5px;
            letter-spacing: 1.8px;
            color: rgba(255,255,255,0.38);
            text-transform: uppercase;
        }

        .loader-bar-track {
            width: 180px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .loader-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--gold), var(--gold-light));
            border-radius: 2px;
            animation: fill-bar 2.5s ease-out forwards;
        }

        @keyframes fill-bar {
            0%   { width: 0%; }
            60%  { width: 75%; }
            100% { width: 100%; }
        }

        /* ====== تأثير إطار الماسح AR على حواف الشاشة ====== */
        #scan-frame {
            position: fixed;
            inset: 0;
            z-index: 9990;
            pointer-events: none;
        }

        .corner {
            position: absolute;
            width: 36px;
            height: 36px;
            border-color: var(--gold);
            border-style: solid;
            opacity: 0.7;
            transition: opacity 0.4s;
        }

        .corner.tl { top: 16px; left: 16px;  border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
        .corner.tr { top: 16px; right: 16px; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
        .corner.bl { bottom: 16px; left: 16px;  border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
        .corner.br { bottom: 16px; right: 16px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }

        #scan-frame.found .corner {
            opacity: 1;
            border-color: #4dff9a;
            box-shadow: 0 0 8px rgba(77, 255, 154, 0.6);
        }

        /* خط الماسح المتحرك */
        #scan-line {
            position: absolute;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            animation: scan-move 2.8s ease-in-out infinite;
            opacity: 0.55;
        }

        @keyframes scan-move {
            0%   { top: 12%; opacity: 0; }
            10%  { opacity: 0.55; }
            90%  { opacity: 0.55; }
            100% { top: 88%; opacity: 0; }
        }

        #scan-frame.found #scan-line {
            display: none;
        }

        /* ====== دائرة الماسح الدوارة في منتصف الشاشة ====== */
        #scan-circle {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9991;
            pointer-events: none;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        #scan-circle.hidden {
            opacity: 0;
            visibility: hidden;
        }

        /* ====== الإطار الإرشادي وسط الشاشة ====== */
        #guide-frame-box {
            position: fixed;
            top: 54%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 62vw;
            height: calc(62vw * 1.35);
            max-height: 72vh;
            max-width: calc(72vh / 1.35);
            z-index: 9992;
            pointer-events: none;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        #guide-frame-box.hidden {
            opacity: 0;
            visibility: hidden;
        }

        /* زوايا الإطار الإرشادي */
        .gf-corner {
            position: absolute;
            width: 28px;
            height: 28px;
            border-color: var(--gold-light);
            border-style: solid;
            animation: gf-pulse 2s ease-in-out infinite;
        }
        .gf-corner.tl { top: 0; left: 0;  border-width: 3px 0 0 3px; border-radius: 3px 0 0 0; }
        .gf-corner.tr { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 3px 0 0; }
        .gf-corner.bl { bottom: 0; left: 0;  border-width: 0 0 3px 3px; border-radius: 0 0 0 3px; }
        .gf-corner.br { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 3px 0; }

        .gf-corner.tr { animation-delay: 0.15s; }
        .gf-corner.bl { animation-delay: 0.30s; }
        .gf-corner.br { animation-delay: 0.45s; }

        @keyframes gf-pulse {
            0%, 100% { opacity: 0.55; box-shadow: none; }
            50%       { opacity: 1;    box-shadow: 0 0 10px rgba(240,208,128,0.6); }
        }

        /* الخطوط الجانبية المتقطعة */
        .gf-edge-h {
            position: absolute;
            left: 32px; right: 32px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201,168,76,0.35), transparent);
        }
        .gf-edge-h.top    { top: 0; }
        .gf-edge-h.bottom { bottom: 0; }

        .gf-edge-v {
            position: absolute;
            top: 32px; bottom: 32px;
            width: 1px;
            background: linear-gradient(180deg, transparent, rgba(201,168,76,0.35), transparent);
        }
        .gf-edge-v.left  { left: 0; }
        .gf-edge-v.right { right: 0; }

        /* نقطة المركز */
        .gf-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            opacity: 0.65;
        }
        .gf-center-icon { font-size: 18px; }
        .gf-center-text {
            font-family: 'Tajawal', sans-serif;
            font-size: 11px;
            color: var(--gold-light);
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        /* ====== العبارة الإرشادية ====== */
        #instruction-overlay {
            position: fixed;
            top: 88px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9998;
            background: var(--dark-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            color: var(--white-dim);
            padding: 10px 22px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.07);
            white-space: nowrap;
            pointer-events: none;
            transition: opacity 0.5s ease, visibility 0.5s ease, transform 0.5s ease;
            text-align: center;
        }

        #instruction-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            transform: translateX(-50%) translateY(-8px);
        }

        .inst-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            background: var(--gold);
            border-radius: 50%;
            margin-left: 8px;
            vertical-align: middle;
            animation: pulse-dot 1.6s ease-in-out infinite;
        }

        .cam-spinner {
            display: inline-block;
            width: 13px;
            height: 13px;
            border: 2px solid rgba(201,168,76,0.25);
            border-top-color: var(--gold);
            border-radius: 50%;
            margin-left: 8px;
            vertical-align: middle;
            animation: cam-spin 0.8s linear infinite;
        }
        @keyframes cam-spin { to { transform: rotate(360deg); } }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.6); }
        }

        /* ====== مؤشر حالة الاستهداف (أعلى اليسار) ====== */
        #status-badge {
            position: fixed;
            top: 110px;
            left: 16px;
            z-index: 9998;
            background: var(--dark-glass-light);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            color: rgba(255,255,255,0.6);
            padding: 7px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            pointer-events: none;
            transition: all 0.4s ease;
        }

        #status-badge .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: background 0.3s;
        }

        #status-badge.active {
            color: #4dff9a;
            border-color: rgba(77, 255, 154, 0.25);
        }

        #status-badge.active .status-dot {
            background: #4dff9a;
            box-shadow: 0 0 6px #4dff9a;
            animation: pulse-dot 1s ease-in-out infinite;
        }

        /* ====== أزرار التحكم العامة ====== */
        .control-btn {
            position: fixed;
            z-index: 9998;
            background: var(--dark-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            color: var(--white-dim);
            cursor: pointer;
            box-shadow: 0 6px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Tajawal', sans-serif;
            text-decoration: none;
            white-space: nowrap;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .control-btn:hover {
            border-color: var(--gold);
            box-shadow: 0 6px 24px rgba(0,0,0,0.4), 0 0 0 1px var(--gold-glow);
        }

        .control-btn:active {
            transform: scale(0.92);
        }

        /* ====== زر كتم الصوت ====== */
        #mute-btn {
            top: 110px;
            right: 16px;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            font-size: 18px;
        }

        /* ====== زر الفيسبوك ====== */
        #facebook-btn {
            bottom: 28px;
            right: 16px;
            background: rgba(24, 119, 242, 0.82);
            border-color: rgba(100, 160, 255, 0.30);
            border-radius: 28px;
            padding: 11px 18px;
            font-size: 13px;
            font-weight: 700;
            gap: 7px;
            box-shadow: 0 6px 22px rgba(24, 119, 242, 0.35);
        }

        #facebook-btn:hover {
            background: rgba(24, 119, 242, 0.95);
            border-color: rgba(100, 160, 255, 0.55);
        }

        /* ====== زر الواتساب ====== */
        #whatsapp-btn {
            bottom: 28px;
            left: 16px;
            background: rgba(18, 170, 84, 0.82);
            border-color: rgba(50, 220, 120, 0.30);
            border-radius: 28px;
            padding: 11px 18px;
            font-size: 13px;
            font-weight: 700;
            gap: 7px;
            box-shadow: 0 6px 22px rgba(18, 170, 84, 0.35);
        }

        #whatsapp-btn:hover {
            background: rgba(18, 170, 84, 0.95);
            border-color: rgba(50, 220, 120, 0.55);
        }

        /* ====== إشعار عند اكتشاف الصورة ====== */
        #found-toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            z-index: 9998;
            background: rgba(77, 255, 154, 0.15);
            border: 1px solid rgba(77, 255, 154, 0.35);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #4dff9a;
            padding: 9px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        #found-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>

    <script>
        let isTargetActive = false;
        let toastTimer = null;

        function showToast(msg) {
            const toast = document.querySelector('#found-toast');
            if (!toast) return;
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
        }

        AFRAME.registerComponent('video-controller', {
            schema: { video: { type: 'selector' } },
            init: function () {
                const video      = this.data.video;
                const target     = this.el;
                const instr      = document.querySelector('#instruction-overlay');
                const music      = document.querySelector('#bg-music');
                const frame      = document.querySelector('#scan-frame');
                const status     = document.querySelector('#status-badge');
                const scanCircle = document.querySelector('#scan-circle');
                const guideFrame = document.querySelector('#guide-frame-box');

                target.addEventListener('targetFound', () => {
                    isTargetActive = true;
                    video.play().catch(e => console.log(e));

                    frame && frame.classList.add('found');
                    status && status.classList.add('active');
                    if (status) status.querySelector('.status-label').textContent = 'جارٍ العرض';
                    instr && instr.classList.add('hidden');
                    scanCircle && scanCircle.classList.add('hidden');
                    guideFrame && guideFrame.classList.add('hidden');
                    showToast('✦ تم اكتشاف الصورة');

                    music.play().catch(() => {
                        if (!music.muted && instr) {
                            instr.innerHTML = '<span class="inst-dot"></span> اضغط على الشاشة لتفعيل الصوت';
                            instr.classList.remove('hidden');
                        }
                    });
                });

                target.addEventListener('targetLost', () => {
                    isTargetActive = false;
                    video.pause();
                    music.pause();

                    frame && frame.classList.remove('found');
                    status && status.classList.remove('active');
                    if (status) status.querySelector('.status-label').textContent = 'جاهز';
                    scanCircle && scanCircle.classList.remove('hidden');
                    guideFrame && guideFrame.classList.remove('hidden');

                    if (instr) {
                        instr.innerHTML = '<span class="inst-dot"></span> وجّه الكاميرا نحو الصورة المطبوعة 📸';
                        instr.classList.remove('hidden');
                    }
                });
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            const music    = document.querySelector('#bg-music');
            const instr    = document.querySelector('#instruction-overlay');
            const muteBtn  = document.querySelector('#mute-btn');
            const guide    = document.querySelector('#guide-frame-box');
            let cameraReady = false;

            /* ---- شاشة التحميل: تختفي بعد تحميل A-Frame ---- */
            const hideLoader = () => {
                const loader = document.querySelector('#loading-screen');
                if (loader) loader.classList.add('hidden');
                /* أظهر "جارٍ تهيئة الكاميرا" في منطقة الإرشاد */
                if (instr && !cameraReady) {
                    instr.innerHTML = '<span class="cam-spinner"></span> جارٍ تهيئة الكاميرا…';
                    instr.classList.remove('hidden');
                }
            };

            const onCameraReady = () => {
                if (cameraReady) return;
                cameraReady = true;
                /* بدّل الرسالة إلى الإرشاد الفعلي */
                if (instr) {
                    instr.innerHTML = '<span class="inst-dot"></span> وجّه الكاميرا نحو الصورة المطبوعة 📸';
                    instr.classList.remove('hidden');
                }
                /* أظهر الإطار الإرشادي */
                guide && guide.classList.remove('hidden');
            };

            const scene = document.querySelector('a-scene');
            if (scene) {
                scene.addEventListener('loaded', () => setTimeout(hideLoader, 800));
                scene.addEventListener('arReady', onCameraReady);
            }
            /* احتياطي: إذا لم يُطلَق arReady بعد 5 ثوانٍ */
            setTimeout(onCameraReady, 5000);
            /* احتياطي لشاشة التحميل */
            setTimeout(hideLoader, 7000);

            /* ---- زر كتم الصوت ---- */
            muteBtn.addEventListener('click', e => {
                e.stopPropagation();
                music.muted = !music.muted;
                muteBtn.textContent = music.muted ? '🔇' : '🔊';
                if (!music.muted && isTargetActive) music.play().catch(() => {});
            });

            /* ---- لمس الشاشة لفك حظر الصوت ---- */
            document.body.addEventListener('click', () => {
                if (isTargetActive && music.paused && !music.muted) {
                    music.play().then(() => {
                        instr && instr.classList.add('hidden');
                    }).catch(() => {});
                }
            });
        });
    </script>
